# Storage mode for the app. MUST match ./config/server/storage.yaml (`mode`).
#   "seaweedfs": both the stub and full-SeaweedFS setups use this value.
#   "r2":        Cloudflare R2 object storage.
mode: "seaweedfs" # "seaweedfs" | "r2"

jwt:
  signing-key: "secret|storage_signing_key"

token-expiration-seconds: 3600

# How the app reaches the core server.
#   internal: the in-network address (Docker service name).
#   external: the address the browser/clients use. For a LAN quickstart,
#             change IP_ADDRESS to your host's LAN IP address (e.g. 192.168.1.10).
#             In production, this likely should be https://checkpoint-backend.example.com; it's up
#             to you to configure TLS termination and reverse proxying if you do that.
backend-url:
  internal: "http://checkpoint-server:13001"
  external: "http://IP_ADDRESS:13001"

# Only used when mode is "r2". account-id is a literal; the credentials are
# resolved from ./config/.secrets (see the r2_* keys).
r2:
  account-id: "" # literal Cloudflare account id (not a secret)
  access-key-id: "secret|r2_access_key_id"
  secret-access-key: "secret|r2_secret_access_key"
  api-token: "secret|r2_api_token"
