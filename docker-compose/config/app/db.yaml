# Prisma
# https://www.prisma.io/docs/reference/database-reference/connection-urls#env
# provider: "sqlite" or "postgresql". This quickstart uses postgresql.
#
# The full connection string lives in ./config/.secrets as `database_url`
# (a whole-value secret). Its password MUST match POSTGRES_PASSWORD in
# docker-compose.yaml.
provider: "postgresql"
url: "secret|database_url"
