# ============================================================================
# Storage mode for the core server. Pick ONE. See src/core/server/STORAGE.md.
#
#   local : the server stores files on a local volume, served through the
#           gateway. No extra services. Easiest; good for trying Checkpoint out
#           and for smaller deployments. (DEFAULT)
#   s3    : any S3-compatible store (SeaweedFS S3 gateway, MinIO, AWS, DO
#           Spaces), proxied through the core-server gateway. One shared bucket;
#           objects keyed by /{org}/{repo}/. Good for larger self-hosted setups.
#   r2    : Cloudflare R2 object storage; clients talk to R2 directly (free
#           egress + edge delivery).
#
# Whatever you choose here MUST match ./config/app/storage.yaml (`mode`).
# Replace IP_ADDRESS in the app config with the host/IP your users reach.
# ============================================================================

mode: "local" # local | s3 | r2

jwt:
  signing-key: "secret|storage_signing_key"

# ----------------------------------------------------------------------------
# 1. local (DEFAULT): store on the server's own volume (the storage-data volume
#    mounted at /app/data by docker-compose.yaml).
# ----------------------------------------------------------------------------
local:
  path: "/app/data"

# ----------------------------------------------------------------------------
# 2. s3: any S3-compatible store, proxied through the gateway. Server-side
#    credentials (full access). For SeaweedFS, run its S3 gateway separately and
#    point here; for MinIO/Spaces/AWS use their endpoint + region. Secrets come
#    from ./config/.secrets (s3_* keys).
# ----------------------------------------------------------------------------
s3:
  endpoint: "" # e.g. http://minio:9000 or https://s3.<region>.amazonaws.com
  region: "" # e.g. us-east-1 (R2 uses "auto"; MinIO/SeaweedFS are lenient)
  bucket: "" # one shared bucket for the whole app
  force-path-style: true # MinIO / SeaweedFS S3 typically need path-style
  access-key-id: "secret|s3_access_key_id"
  secret-access-key: "secret|s3_secret_access_key"

# ----------------------------------------------------------------------------
# 3. r2: set `mode: "r2"` above and fill these in. Secrets come from
#    ./config/.secrets (see the r2_* keys).
# ----------------------------------------------------------------------------
r2:
  account-id: "" # literal Cloudflare account id (not a secret)
  access-key-id: "secret|r2_access_key_id"
  secret-access-key: "secret|r2_secret_access_key"
  api-token: "secret|r2_api_token"
