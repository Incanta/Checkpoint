# ============================================================================
# Storage mode. Pick ONE of the three setups below. We internally use R2 as it
# provides a good balance of performance, reliability (e.g. cloud backup), and cost.
# If you're a smaller team or just trying Checkpoint out, the default "Filer w/ stub"
# is likely the easiest to get started with since it just stores the files on the local disk.
#
#   1. Filer w/ stub      (default): server serves files from a local volume.
#                           No extra services. Good for trying Checkpoint out and
#                           smaller deployments.
#   2. Filer w/ SeaweedFS:           real SeaweedFS cluster (master/volume/filer).
#                           Run with: docker compose --profile seaweedfs up
#                           Likely only useful for larger deployments.
#   3. R2:                           Cloudflare R2 object storage.
#
# Whatever you choose here MUST match ./config/app/storage.yaml (`mode`).
# Replace IP_ADDRESS with the host/IP your users reach this machine at.
# ============================================================================

mode: "seaweedfs" # "seaweedfs" | "r2"

jwt:
  signing-key: "secret|storage_signing_key"

# ----------------------------------------------------------------------------
# 1. Filer w/ stub (DEFAULT)
# ----------------------------------------------------------------------------
seaweedfs:
  stub:
    enabled: true
    storage-path: "/app/data"
  connection:
    master:
      host: "seaweed-master"
      port: 9333
      tls: false
    filer:
      # The server reaching its own embedded stub filer over the network.
      internal:
        host: "checkpoint-server"
        port: 13001
        tls: false
        path: "/filer"
      # What the Checkpoint CLI/daemon on user machines uses. Must be the
      # externally reachable address of the server.
      external:
        host: "IP_ADDRESS"
        port: 13001
        tls: false
        path: "/filer"

# ----------------------------------------------------------------------------
# 2. Filer w/ SeaweedFS: uncomment, set `stub.enabled: false` above, and run
#    `docker compose --profile seaweedfs up`. The filer is published on host
#    port 13002 (-> container 8888) by docker-compose.yaml.
# ----------------------------------------------------------------------------
#   seaweedfs:
#     stub:
#       enabled: false
#       storage-path: "/app/data"
#     connection:
#       master:
#         host: "seaweed-master"
#         port: 9333
#         tls: false
#       filer:
#         internal:
#           host: "seaweed-filer"
#           port: 8888
#           tls: false
#           path: ""
#         external:
#           host: "IP_ADDRESS"
#           port: 13002
#           tls: false
#           path: ""

# ----------------------------------------------------------------------------
# 3. R2: set `mode: "r2"` above and fill these in. Secrets come from
#    ./config/.secrets (see the r2_* keys).
# ----------------------------------------------------------------------------
r2:
  account-id: "" # literal Cloudflare account id (not a secret)
  access-key-id: "secret|r2_access_key_id"
  secret-access-key: "secret|r2_secret_access_key"
  api-token: "secret|r2_api_token"
