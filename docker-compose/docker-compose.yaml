services:
  # ----------------------------------------------------------------
  # App — Next.js application (UI + API)
  # ----------------------------------------------------------------
  app:
    container_name: checkpoint-app
    image: ghcr.io/incanta/checkpoint-app:latest-sqlite
    restart: unless-stopped
    networks:
      - checkpoint
    ports:
      - "13000:13000"
    volumes:
      - app-data:/app/data
      - ./config/app:/app/config
      - ./config/.secrets:/app/.secrets:ro

  # ----------------------------------------------------------------
  # Server — Core storage server
  # ----------------------------------------------------------------
  server:
    container_name: checkpoint-server
    image: ghcr.io/incanta/checkpoint-server:latest
    restart: unless-stopped
    networks:
      - checkpoint
    ports:
      - "13001:13001"
    volumes:
      - storage-data:/app/data
      - ./config/server:/app/config
      - ./config/.secrets:/app/.secrets:ro

volumes:
  app-data:
  storage-data:

networks:
  checkpoint:
