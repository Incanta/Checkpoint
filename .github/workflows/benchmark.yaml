name: VCS Benchmark
run-name: VCS Benchmark (${{ inputs.profile }})

# Coordinator workflow: provisions two DigitalOcean droplets (server + client)
# per VCS, runs the benchmark over SSH, then tears everything down. All run
# parameters come from a version-controlled config profile
# (benchmark/config.<profile>.json), selected via the `profile` dispatch input
# and copied to benchmark/config.json at run time, so every run is reproducible
# from git history. The profile selector is the only dispatch input.

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Config profile to run (benchmark/config.<profile>.json)"
        type: choice
        # The default profile is whichever name is set here (and listed first
        # below). Add an entry to `options` for each committed
        # benchmark/config.<name>.json you want selectable from this dropdown.
        default: titan
        options:
          - titan
          - lyra

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # Read the committed config and turn the `vcs` list into a job matrix.
  # --------------------------------------------------------------------------
  config:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.cfg.outputs.matrix }}
      region: ${{ steps.cfg.outputs.region }}
      droplet_size: ${{ steps.cfg.outputs.droplet_size }}
      data_volume_gb: ${{ steps.cfg.outputs.data_volume_gb }}
      server_volume_gb: ${{ steps.cfg.outputs.server_volume_gb }}
      resource_interval_s: ${{ steps.cfg.outputs.resource_interval_s }}
      chart_label_every: ${{ steps.cfg.outputs.chart_label_every }}
      small_change_file: ${{ steps.cfg.outputs.small_change_file }}
      tarball_url: ${{ steps.cfg.outputs.tarball_url }}
      checkpoint_version: ${{ steps.cfg.outputs.checkpoint_version }}
      keep_droplets: ${{ steps.cfg.outputs.keep_droplets }}
    steps:
      - uses: actions/checkout@v6
      - name: Select config profile
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          # Fallback matches the input's default above, for non-UI dispatches
          # (e.g. the API) that send no profile value.
          profile="${PROFILE:-lyra}"
          src="benchmark/config.${profile}.json"
          if [ ! -f "$src" ]; then
            echo "::error::config profile '${profile}' not found (${src})."
            echo "Available profiles:" >&2
            ls benchmark/config.*.json >&2 || true
            exit 1
          fi
          cp "$src" benchmark/config.json
          echo "Using config profile '${profile}' (${src}):"
          cat benchmark/config.json
      - name: Parse benchmark/config.json
        id: cfg
        run: |
          node -e '
            const fs = require("fs");
            const c = JSON.parse(fs.readFileSync("benchmark/config.json", "utf8"));
            const out = process.env.GITHUB_OUTPUT;
            const set = (k, v) => fs.appendFileSync(out, `${k}=${v}\n`);
            const vcs = Array.isArray(c.vcs) && c.vcs.length ? c.vcs : ["checkpoint"];
            set("matrix", JSON.stringify(vcs));
            set("region", c.region || "nyc3");
            set("droplet_size", c.droplet_size || "c-8");
            set("data_volume_gb", String(c.data_volume_gb || 200));
            set("server_volume_gb", String(c.server_volume_gb || 200));
            set("resource_interval_s", String(c.resource_interval_s || 30));
            set("chart_label_every", c.chart_label_every === "sample" ? "sample" : "minute");
            set("small_change_file", c.small_change_file || "");
            set("tarball_url", c.tarball_url || "");
            set("checkpoint_version", c.checkpoint_version || "");
            set("keep_droplets", String(!!c.keep_droplets));
          '

  # --------------------------------------------------------------------------
  # One benchmark run per VCS, each with its own isolated droplet pair.
  # --------------------------------------------------------------------------
  benchmark:
    needs: config
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        vcs: ${{ fromJson(needs.config.outputs.matrix) }}
    env:
      REGION: ${{ needs.config.outputs.region }}
      DROPLET_SIZE: ${{ needs.config.outputs.droplet_size }}
      DATA_VOLUME_GB: ${{ needs.config.outputs.data_volume_gb }}
      SERVER_VOLUME_GB: ${{ needs.config.outputs.server_volume_gb }}
      RES_INTERVAL: ${{ needs.config.outputs.resource_interval_s }}
      CHART_LABEL_EVERY: ${{ needs.config.outputs.chart_label_every }}
      SMALL_CHANGE_FILE: ${{ needs.config.outputs.small_change_file }}
      TARBALL_URL: ${{ needs.config.outputs.tarball_url }}
      CHECKPOINT_VERSION: ${{ needs.config.outputs.checkpoint_version }}
      SPACES_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
      SPACES_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v6

      - name: Set run tag
        run: echo "RUN_TAG=bench-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.vcs }}" >> "$GITHUB_ENV"

      - name: Install + authenticate doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Generate ephemeral SSH key and register with DigitalOcean
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -f ~/.ssh/bench_key -N "" -C "$RUN_TAG"
          FP=$(doctl compute ssh-key import "$RUN_TAG" \
            --public-key-file ~/.ssh/bench_key.pub \
            --format FingerPrint --no-header)
          echo "SSH_FINGERPRINT=$FP" >> "$GITHUB_ENV"

      - name: Provision droplets
        env:
          SSH_FINGERPRINT: ${{ env.SSH_FINGERPRINT }}
        run: bash benchmark/lib/provision.sh

      - name: Run benchmark
        run: bash benchmark/run-benchmark.sh --vcs "${{ matrix.vcs }}" --out "timings.${{ matrix.vcs }}.json"

      - name: Render summary
        if: always()
        run: |
          if [ -f "timings.${{ matrix.vcs }}.json" ]; then
            node benchmark/summarize.js "timings.${{ matrix.vcs }}.json" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload timings artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: timings-${{ matrix.vcs }}
          # timings.<vcs>.json (with resources embedded for the charts) plus the
          # standalone resources.<vcs>.json (raw CPU/RAM samples).
          path: |
            timings.${{ matrix.vcs }}.json
            resources.${{ matrix.vcs }}.json
          if-no-files-found: warn

      - name: Teardown droplets
        if: always() && needs.config.outputs.keep_droplets != 'true'
        run: bash benchmark/lib/teardown.sh

  # --------------------------------------------------------------------------
  # Combine every per-VCS timings artifact into one comparison table. Runs even
  # if some matrix jobs failed, summarizing whatever artifacts were produced.
  # --------------------------------------------------------------------------
  combine:
    needs: benchmark
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all timings artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: timings-*
          path: all-timings
          merge-multiple: true

      - name: Render combined summary
        run: |
          shopt -s nullglob
          # Only the timings.*.json files (which carry the embedded resources);
          # the standalone resources.*.json are raw-sample artifacts, not runs.
          files=(all-timings/timings.*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No timings artifacts were produced (all benchmark jobs failed before writing results)." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # summarize.js already renders one column per VCS when given multiple
          # files, so the combined table is just every artifact passed at once.
          node benchmark/summarize.js "${files[@]}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload combined timings
        uses: actions/upload-artifact@v7
        with:
          name: timings-combined
          path: all-timings/*.json
          if-no-files-found: warn
