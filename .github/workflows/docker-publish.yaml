name: Docker Publish
run-name: Docker Publish ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., 1.2.3)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      app_image: ${{ steps.vars.outputs.app_image }}
      server_image: ${{ steps.vars.outputs.server_image }}
    steps:
      - name: Set lowercase image names
        id: vars
        run: |
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "app_image=${OWNER}/checkpoint-app" >> "$GITHUB_OUTPUT"
          echo "server_image=${OWNER}/checkpoint-server" >> "$GITHUB_OUTPUT"

  build-app:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - db_provider: postgresql
            tag: postgres
          - db_provider: sqlite
            tag: sqlite
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/app/Dockerfile
          push: true
          build-args: |
            DB_PROVIDER=${{ matrix.db_provider }}
          tags: |
            ${{ env.REGISTRY }}/${{ needs.setup.outputs.app_image }}:${{ inputs.version }}-${{ matrix.tag }}
            ${{ env.REGISTRY }}/${{ needs.setup.outputs.app_image }}:latest-${{ matrix.tag }}
          platforms: linux/amd64
          cache-from: type=gha,scope=app-${{ matrix.tag }}
          cache-to: type=gha,mode=max,scope=app-${{ matrix.tag }}

  build-server:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/core/server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.setup.outputs.server_image }}:${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ needs.setup.outputs.server_image }}:latest
          platforms: linux/amd64
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server
