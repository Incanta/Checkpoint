name: Docker Publish
run-name: Docker Publish ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., 1.2.3)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ${{ github.repository_owner }}/checkpoint-app
  SERVER_IMAGE: ${{ github.repository_owner }}/checkpoint-server

jobs:
  build-app:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/app/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.APP_IMAGE }}:${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ env.APP_IMAGE }}:latest
          platforms: linux/amd64
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

  build-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/core/server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE }}:${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE }}:latest
          platforms: linux/amd64
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server
