name: Build Installers

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: "Version override (leave empty to use VERSION file)"
        required: false
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: "22"

jobs:
  # ============================================================
  # Phase 1: Read version and prepare build metadata
  # ============================================================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version_override }}" ]; then
            echo "version=${{ inputs.version_override }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
          fi

      - name: Print version
        run: echo "Building version ${{ steps.version.outputs.version }}"

  # ============================================================
  # Phase 2: Build CLI (C++ binaries) for each platform
  # ============================================================
  build-cli:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32-x64
            cli_binary: checkpoint.exe
            cli_alias: chk.exe
          - os: ubuntu-latest
            platform: linux-x64
            cli_binary: checkpoint
            cli_alias: chk
          - os: macos-15-intel
            platform: darwin-x64
            cli_binary: checkpoint
            cli_alias: chk
          - os: macos-latest
            platform: darwin-arm64
            cli_binary: checkpoint
            cli_alias: chk

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        shell: bash
        run: |
          vcpkg install curl nlohmann-json --triplet x64-windows-static

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libcurl4-openssl-dev nlohmann-json3-dev

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cmake nlohmann-json curl

      - name: Build CLI
        shell: bash
        run: |
          cd src/clients/cli
          mkdir -p build && cd build
          if [ "$RUNNER_OS" = "Windows" ]; then
            cmake .. -G "Visual Studio 17 2022" -A x64 \
              -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
              -DVCPKG_TARGET_TRIPLET=x64-windows-static \
              -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
            cmake --build . --config Release
            cp Release/${{ matrix.cli_binary }} .
            cp Release/${{ matrix.cli_alias }} .
          else
            cmake .. -DCMAKE_BUILD_TYPE=Release
            cmake --build . --config Release
          fi

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.platform }}
          path: |
            src/clients/cli/build/${{ matrix.cli_binary }}
            src/clients/cli/build/${{ matrix.cli_alias }}

  # ============================================================
  # Phase 3: Build Daemon SEA binary for each platform
  # ============================================================
  build-daemon:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32-x64
            daemon_binary: checkpoint-daemon.exe
            build_script: scripts/build-daemon-sea.ps1
          - os: ubuntu-latest
            platform: linux-x64
            daemon_binary: checkpoint-daemon
            build_script: scripts/build-daemon-sea.sh
          - os: macos-15-intel
            platform: darwin-x64
            daemon_binary: checkpoint-daemon
            build_script: scripts/build-daemon-sea.sh
          - os: macos-latest
            platform: darwin-arm64
            daemon_binary: checkpoint-daemon
            build_script: scripts/build-daemon-sea.sh

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build typescript
        run: yarn build

      - name: Install esbuild and postject
        run: |
          npm install -g esbuild postject

      - name: Build Daemon SEA (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x ${{ matrix.build_script }}
          ./${{ matrix.build_script }}

      - name: Build Daemon SEA (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\${{ matrix.build_script }}

      - name: Upload Daemon artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daemon-${{ matrix.platform }}
          path: src/core/daemon/dist-sea/

  # ============================================================
  # Phase 3b: Build Tray application (Go) for each platform
  # ============================================================
  build-tray:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32-x64
            binary: checkpoint-tray.exe
            ldflags: "-s -w -H windowsgui"
          - os: ubuntu-latest
            platform: linux-x64
            binary: checkpoint-tray
            ldflags: "-s -w"
          - os: macos-15-intel
            platform: darwin-x64
            binary: checkpoint-tray
            ldflags: "-s -w"
          - os: macos-latest
            platform: darwin-arm64
            binary: checkpoint-tray
            ldflags: "-s -w"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Linux GTK dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgtk-3-dev libayatana-appindicator3-dev

      - name: Build tray application
        run: |
          cd src/clients/tray
          go build -ldflags='${{ matrix.ldflags }}' -o ${{ matrix.binary }} .

      - name: Include autostart file (Linux)
        if: runner.os == 'Linux'
        run: cp installer/linux/checkpoint-tray.desktop src/clients/tray/

      - name: Upload tray artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tray-${{ matrix.platform }}
          path: |
            src/clients/tray/${{ matrix.binary }}
            src/clients/tray/checkpoint-tray.desktop

  # ============================================================
  # Phase 4: Build installers for each platform
  # ============================================================
  build-installers:
    needs: [prepare, build-cli, build-daemon, build-tray]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32-x64
            electron_arch: x64
          - os: ubuntu-latest
            platform: linux-x64
            electron_arch: x64
          - os: macos-15-intel
            platform: darwin-x64
            electron_arch: x64
          - os: macos-latest
            platform: darwin-arm64
            electron_arch: arm64

    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.prepare.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build typescript
        run: yarn build

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          name: cli-${{ matrix.platform }}
          path: src/clients/desktop/build-resources/cli/

      - name: Download Daemon artifacts
        uses: actions/download-artifact@v4
        with:
          name: daemon-${{ matrix.platform }}
          path: src/clients/desktop/build-resources/daemon/

      - name: Download Tray artifacts
        uses: actions/download-artifact@v4
        with:
          name: tray-${{ matrix.platform }}
          path: src/clients/desktop/build-resources/tray/

      - name: Make binaries executable (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x src/clients/desktop/build-resources/cli/* || true
          chmod +x src/clients/desktop/build-resources/daemon/* || true
          chmod +x src/clients/desktop/build-resources/tray/* || true

      - name: Set version in package.json
        shell: bash
        run: |
          cd src/clients/desktop
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf-8'));
            pkg.version = '${{ env.VERSION }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      # ---- Code Signing Setup ----

      - name: Import Windows signing certificate
        if: runner.os == 'Windows' && env.WINDOWS_CERT_BASE64 != ''
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        shell: pwsh
        run: |
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64)
          $certPath = Join-Path $env:RUNNER_TEMP "signing-cert.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          echo "WINDOWS_CERT_FILE=$certPath" >> $env:GITHUB_ENV

      - name: Import macOS signing certificate
        if: runner.os == 'macOS' && env.MACOS_CERT_BASE64 != ''
        env:
          MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/signing-cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$MACOS_CERT_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install @electron/notarize
        if: runner.os == 'macOS'
        run: |
          cd src/clients/desktop
          yarn add --dev @electron/notarize

      # ---- Build TypeScript + Vite + Electron ----

      - name: Generate .ico from .png (NSIS requires .ico)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd src/clients/desktop
          node -e "
            const sharp = require('sharp');
            const fs = require('fs');
            const sizes = [16, 32, 48, 64, 128, 256];
            async function createIco() {
              const buffers = [];
              for (const size of sizes) {
                const buf = await sharp('public/icon.png').resize(size, size).png().toBuffer();
                buffers.push({ size, buf });
              }
              const headerSize = 6;
              const dirEntrySize = 16;
              let offset = headerSize + dirEntrySize * buffers.length;
              const header = Buffer.alloc(headerSize);
              header.writeUInt16LE(0, 0);
              header.writeUInt16LE(1, 2);
              header.writeUInt16LE(buffers.length, 4);
              const dirEntries = [];
              const imgDataParts = [];
              for (const { size, buf } of buffers) {
                const entry = Buffer.alloc(dirEntrySize);
                entry.writeUInt8(size < 256 ? size : 0, 0);
                entry.writeUInt8(size < 256 ? size : 0, 1);
                entry.writeUInt8(0, 2);
                entry.writeUInt8(0, 3);
                entry.writeUInt16LE(1, 4);
                entry.writeUInt16LE(32, 6);
                entry.writeUInt32LE(buf.length, 8);
                entry.writeUInt32LE(offset, 12);
                dirEntries.push(entry);
                imgDataParts.push(buf);
                offset += buf.length;
              }
              const ico = Buffer.concat([header, ...dirEntries, ...imgDataParts]);
              fs.writeFileSync('public/icon.ico', ico);
              console.log('Generated icon.ico with sizes:', sizes.join(', '));
            }
            createIco().catch(e => { console.error(e); process.exit(1); });
          "

      - name: Build app
        run: |
          cd src/clients/desktop
          npx tsc
          npx vite build

      - name: Strip deps before packaging (all bundled by Vite)
        shell: bash
        run: |
          cd src/clients/desktop
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf-8'));
            pkg.dependencies = {};
            pkg.devDependencies = {};
            pkg.peerDependencies = {};
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          node -e "
            const fs = require('fs');
            const rootPkg = JSON.parse(fs.readFileSync('../../../package.json', 'utf-8'));
            delete rootPkg.workspaces;
            fs.writeFileSync('../../../package.json', JSON.stringify(rootPkg, null, 2));
          "
          rm -rf node_modules

      - name: Strip code signing config if certs not available
        shell: bash
        env:
          HAS_WIN_CERT: ${{ secrets.WINDOWS_CERT_BASE64 != '' }}
          HAS_MAC_CERT: ${{ secrets.MACOS_CERT_BASE64 != '' }}
        run: |
          cd src/clients/desktop
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('electron-builder.json', 'utf-8'));
            if (process.env.HAS_WIN_CERT !== 'true' && cfg.win) {
              delete cfg.win.certificateFile;
              delete cfg.win.certificatePassword;
              delete cfg.win.signingHashAlgorithms;
            }
            if (process.env.HAS_MAC_CERT !== 'true') {
              if (cfg.mac) {
                cfg.mac.identity = null;
              }
              delete cfg.afterSign;
            }
            fs.writeFileSync('electron-builder.json', JSON.stringify(cfg, null, 2));
          "

      - name: Install NSIS EnVar plugin (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pluginUrl = "https://nsis.sourceforge.io/mediawiki/images/7/7f/EnVar_plugin.zip"
          $zipPath = "$env:RUNNER_TEMP\EnVar_plugin.zip"
          $extractPath = "$env:RUNNER_TEMP\EnVar_plugin"
          Invoke-WebRequest -Uri $pluginUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force

          # Debug: show extracted contents
          Write-Host "Extracted contents:"
          Get-ChildItem -Recurse $extractPath | ForEach-Object { Write-Host $_.FullName }

          # Find the actual EnVar.dll for x86-unicode
          $dllPath = Get-ChildItem -Recurse -Path $extractPath -Filter "EnVar.dll" |
            Where-Object { $_.FullName -match "x86-unicode" } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $dllPath) {
            Write-Error "Could not find EnVar.dll for x86-unicode in extracted archive"
            exit 1
          }

          # Copy to build-resources/x86-unicode (electron-builder auto-detects this path)
          $pluginDir = "src/clients/desktop/build-resources/x86-unicode"
          New-Item -ItemType Directory -Path $pluginDir -Force | Out-Null
          Copy-Item $dllPath (Join-Path $pluginDir "EnVar.dll") -Force
          Write-Host "EnVar.dll installed to $pluginDir"

          # Also copy into electron-builder NSIS cache if it exists
          $nsisCache = "$env:LOCALAPPDATA\electron-builder\Cache\nsis"
          if (Test-Path $nsisCache) {
            Get-ChildItem $nsisCache -Directory | ForEach-Object {
              $cachePluginDir = Join-Path $_.FullName "Plugins\x86-unicode"
              if (Test-Path $cachePluginDir) {
                Copy-Item $dllPath $cachePluginDir -Force
                Write-Host "EnVar.dll also installed to $cachePluginDir"
              }
            }
          }

      - name: Package installer (Windows)
        if: runner.os == 'Windows'
        env:
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        shell: pwsh
        run: |
          cd src/clients/desktop
          npx electron-builder --win --x64 --publish never

      - name: Package installer (Linux)
        if: runner.os == 'Linux'
        run: |
          cd src/clients/desktop
          npx electron-builder --linux deb rpm --x64 --publish never

      - name: Package installer (macOS)
        if: runner.os == 'macOS'
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          cd src/clients/desktop
          npx electron-builder --mac pkg --${{ matrix.electron_arch }} --publish never

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: |
            src/clients/desktop/release/${{ env.VERSION }}/*.exe
            src/clients/desktop/release/${{ env.VERSION }}/*.deb
            src/clients/desktop/release/${{ env.VERSION }}/*.rpm
            src/clients/desktop/release/${{ env.VERSION }}/*.pkg
            src/clients/desktop/release/${{ env.VERSION }}/*.dmg
          if-no-files-found: error

  # ============================================================
  # Phase 5: Create GitHub Release with all installers
  # ============================================================
  create-release:
    needs: [prepare, build-installers]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          path: release-assets/
          merge-multiple: true

      - name: List release assets
        run: find release-assets/ -type f | sort

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Checkpoint v${{ env.VERSION }}
          draft: true
          generate_release_notes: true
          files: |
            release-assets/**/*.exe
            release-assets/**/*.deb
            release-assets/**/*.rpm
            release-assets/**/*.pkg
            release-assets/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
