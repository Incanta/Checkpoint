name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths: ["website/**", ".github/workflows/deploy-website.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: website
        run: yarn install --immutable

      # Build Docusaurus first (generates blog archive for Next.js)
      - name: Build Docusaurus
        working-directory: website/docusaurus
        run: yarn docusaurus build

      - name: Generate blog archive
        working-directory: website/docusaurus
        run: node gen-blog-archive.js

      # Build Next.js (uses blog-archive.json from Docusaurus)
      - name: Build
        working-directory: website
        run: yarn build

      # Merge Docusaurus output into Next.js output
      - name: Merge Docusaurus into output
        working-directory: website/docusaurus
        run: node move-build.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./website/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
